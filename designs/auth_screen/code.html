<!DOCTYPE html>

<html class="light" lang="en"><head>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#8A9A86", // Sage Green from PRD
            "text-dark": "#111111",
            "muted": "#888888",
            "accent": "#E2E2E2",
            "surface": "#F7F7F7",
            "background-light": "#ffffff",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"],
            "sans": ["Public Sans", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0px",
            "lg": "0px",
            "xl": "0px",
            "full": "0px"
          },
        },
      },
    }
  </script>
<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* Simple state toggle simulation using peer and hidden */
    #auth-toggle-signup:checked ~ form #field-fullname { display: block; }
    #auth-toggle-signup:checked ~ form #btn-submit-text-signup { display: block; }
    #auth-toggle-signup:checked ~ form #btn-submit-text-signin { display: none; }
    
    #auth-toggle-signin:checked ~ form #field-fullname { display: none; }
    #auth-toggle-signin:checked ~ form #btn-submit-text-signup { display: none; }
    #auth-toggle-signin:checked ~ form #btn-submit-text-signin { display: block; }

    /* Tab indicator styling */
    #auth-toggle-signin:checked ~ .tabs #tab-signin { border-bottom-color: #8A9A86; color: #111111; }
    #auth-toggle-signup:checked ~ .tabs #tab-signup { border-bottom-color: #8A9A86; color: #111111; }
  </style>
</head>
<body class="bg-background-light font-sans text-text-dark">
<div class="min-h-screen flex flex-col">
<!-- Minimal Header -->
<header class="p-6">
<div class="max-w-md mx-auto flex items-center">
<button class="flex items-center text-text-dark" data-icon="arrow_back">
<span class="material-symbols-outlined">arrow_back</span>
</button>
</div>
</header>
<!-- Main Content Section -->
<main class="flex-1 flex flex-col justify-center px-6 pb-12">
<div class="max-w-md w-full mx-auto">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold font-display uppercase tracking-wider mb-2">Steady Pace</h1>
<p class="text-xs text-muted uppercase tracking-widest">Entry point and authentication</p>
</div>
<!-- Hidden Checkboxes for State Management -->
<input checked="" class="hidden" id="auth-toggle-signin" name="auth-mode" type="radio"/>
<input class="hidden" id="auth-toggle-signup" name="auth-mode" type="radio"/>
<!-- Tabs -->
<div class="tabs flex border-b border-accent mb-10">
<label class="flex-1 text-center py-3 text-[10px] font-bold uppercase tracking-[0.2em] cursor-pointer border-b-2 border-transparent text-muted transition-all" for="auth-toggle-signin" id="tab-signin">
            Sign In
          </label>
<label class="flex-1 text-center py-3 text-[10px] font-bold uppercase tracking-[0.2em] cursor-pointer border-b-2 border-transparent text-muted transition-all" for="auth-toggle-signup" id="tab-signup">
            Create Account
          </label>
</div>
<form class="space-y-6">
<!-- Full Name (Only visible in Signup mode) -->
<div class="hidden" id="field-fullname">
<label class="block text-[10px] font-bold uppercase tracking-widest mb-1 text-muted">Full Name</label>
<input class="w-full h-12 bg-surface border-b border-accent border-t-0 border-x-0 py-3 px-0 focus:ring-0 focus:border-text-dark placeholder:text-muted transition-colors text-base" placeholder="John Doe" type="text"/>
</div>
<!-- Email -->
<div>
<label class="block text-[10px] font-bold uppercase tracking-widest mb-1 text-muted">Email</label>
<input class="w-full h-12 bg-surface border-b border-accent border-t-0 border-x-0 py-3 px-0 focus:ring-0 focus:border-text-dark placeholder:text-muted transition-colors text-base" placeholder="email@example.com" type="email"/>
</div>
<!-- Password -->
<div>
<label class="block text-[10px] font-bold uppercase tracking-widest mb-1 text-muted">Password</label>
<div class="relative flex items-center">
<input class="w-full h-12 bg-surface border-b border-accent border-t-0 border-x-0 py-3 px-0 focus:ring-0 focus:border-text-dark placeholder:text-muted transition-colors text-base" placeholder="••••••••" type="password"/>
<button class="absolute right-0 text-text-dark" data-icon="visibility" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Primary Submit Button -->
<div class="pt-6">
<button class="w-full bg-primary text-white py-4 text-xs font-bold font-display uppercase tracking-[0.2em] hover:opacity-90 transition-opacity" type="submit">
<span id="btn-submit-text-signin">Sign In</span>
<span class="hidden" id="btn-submit-text-signup">Create Account</span>
</button>
</div>
<div class="relative flex py-4 items-center">
<div class="flex-grow border-t border-accent"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold text-muted uppercase tracking-widest">OR</span>
<div class="flex-grow border-t border-accent"></div>
</div>
<!-- Social Login -->
<div>
<button class="w-full flex items-center justify-center gap-3 border border-accent bg-white py-4 text-xs font-bold font-display uppercase tracking-[0.2em] text-text-dark hover:bg-surface transition-colors" type="button">
<svg class="w-4 h-4" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
              Continue with Google
            </button>
</div>
</form>
<!-- Footer Info -->
<div class="mt-12 text-center">
<p class="text-[10px] text-muted uppercase tracking-widest leading-relaxed">
            By continuing, you agree to Steady Pace's <br/>
<a class="text-text-dark border-b border-accent" href="#">Terms of Service</a> and <a class="text-text-dark border-b border-accent" href="#">Privacy Policy</a>
</p>
</div>
</div>
</main>
<!-- Decorative Aesthetic Element -->
<div class="h-1 bg-accent w-12 mx-auto mb-8"></div>
</div>
<!-- Background Decorative Visuals -->
<div class="fixed top-0 right-0 -z-10 opacity-5 p-8 pointer-events-none">
<div class="w-48 h-48 border-t border-r border-text-dark"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-5 p-8 pointer-events-none">
<div class="w-48 h-48 border-b border-l border-text-dark"></div>
</div>
</body></html>
