<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Steady Pace - Progress Summary</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&amp;family=Satoshi:ital,wght@0,400;0,500;0,700;1,400&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#5ce33b",
          "background-light": "#f6f8f6",
          "background-dark": "#142111",
          "surface": "#F7F7F7",
          "text-main": "#111111",
          "muted": "#888888",
          "accent": "#E2E2E2"
        },
        fontFamily: {
          "display": ["Space Grotesk", "sans-serif"],
          "body": ["Satoshi", "sans-serif"]
        },
        borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem", "none": "0px"},
      },
    },
  }
</script>
<style>
  body {
    background-color: #FFFFFF;
    color: #111111;
  }
</style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="font-body antialiased flex flex-col min-h-screen selection:bg-primary selection:text-black">
<main class="flex-1 flex flex-col pt-12 pb-24 px-6 md:px-12 max-w-md mx-auto w-full relative">
<!-- Header / Big Stat -->
<section class="mb-12 flex flex-col items-start w-full">
<h1 class="font-display font-semibold text-[64px] leading-[1.1] tracking-tight text-text-main">12.5 <span class="text-4xl text-text-main">HRS</span> <span class="text-2xl text-muted ml-2 opacity-50">/ 125.0 KM</span></h1>
<p class="font-body font-medium text-xs text-muted uppercase tracking-[0.1em] mt-2 border-b border-text-main pb-1">
      OUT OF 14.0 HRS PLANNED
    </p>
</section>
<!-- Discipline Progress Bars -->
<section class="flex flex-col gap-8 w-full">
<!-- SWIM -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<h2 class="font-display font-medium text-sm text-text-main tracking-widest uppercase">SWIM</h2>
<span class="font-body font-medium text-xs text-muted uppercase">2.0 / 2.5 HRS • 4.0 / 5.0 KM</span>
</div>
<div class="w-full h-2 bg-surface border border-accent rounded-sm overflow-hidden">
<div class="h-full bg-primary" style="width: 80%;"></div>
</div>
</div>
<!-- BIKE -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<h2 class="font-display font-medium text-sm text-text-main tracking-widest uppercase">BIKE</h2>
<span class="font-body font-medium text-xs text-muted uppercase">5.5 / 6.0 HRS • 88.0 / 95.0 KM</span>
</div>
<div class="w-full h-2 bg-surface border border-accent rounded-sm overflow-hidden">
<div class="h-full bg-primary" style="width: 91%;"></div>
</div>
</div>
<!-- RUN -->
<div class="flex flex-col gap-2">
<div class="flex justify-between items-end">
<h2 class="font-display font-medium text-sm text-text-main tracking-widest uppercase">RUN</h2>
<span class="font-body font-medium text-xs text-muted uppercase">5.0 / 5.5 HRS • 33.0 / 40.0 KM</span>
</div>
<div class="w-full h-2 bg-surface border border-accent rounded-sm overflow-hidden">
<div class="h-full bg-primary" style="width: 90%;"></div>
</div>
</div>
</section>
<!-- Milestone text -->
<section class="mt-12 w-full p-4 bg-surface border border-accent rounded-sm">
<p class="font-body text-base text-text-main italic leading-relaxed">
      Next milestone: Longest run (8km) on Sunday.
    </p>
</section>
</main>
<!-- Shared Component: Bottom Navigation -->
<div class="fixed bottom-0 left-0 w-full z-50">
<div class="flex gap-2 border-t border-[#eaf3e8] bg-white px-4 pb-4 pt-3 max-w-md mx-auto">
<a class="just flex flex-1 flex-col items-center justify-end gap-1 text-muted hover:text-text-main transition-colors" href="#">
<div class="flex h-8 items-center justify-center" data-icon="House" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined" style="font-size: 24px;">home</span>
</div>
<p class="font-display text-xs font-medium leading-normal tracking-[0.015em]">HOME</p>
</a>
<a class="just flex flex-1 flex-col items-center justify-end gap-1 text-muted hover:text-text-main transition-colors" href="#">
<div class="flex h-8 items-center justify-center" data-icon="Calendar" data-size="24px" data-weight="regular">
<span class="material-symbols-outlined" style="font-size: 24px;">calendar_today</span>
</div>
<p class="font-display text-xs font-medium leading-normal tracking-[0.015em]">PLAN</p>
</a>
<a class="just flex flex-1 flex-col items-center justify-end gap-1 text-text-main" href="#">
<div class="flex h-8 items-center justify-center" data-icon="ChartBar" data-size="24px" data-weight="fill">
<span class="material-symbols-outlined" style="font-size: 24px; font-variation-settings: 'FILL' 1;">bar_chart</span>
</div>
<p class="font-display text-xs font-bold leading-normal tracking-[0.015em] border-b-2 border-text-main pb-0.5">PROGRESS</p>
</a>
</div>
</div>
</body></html>
